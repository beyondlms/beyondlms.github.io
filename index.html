
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crypto Monitor</title>
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: rgba(16, 24, 48, 0.7);
    --row: rgba(20, 30, 60, 0.6);
    --row-hover-up: rgba(0, 255, 136, 0.1);
    --row-hover-down: rgba(255, 65, 108, 0.1);
    --text: #e8f4f8;
    --dim: #8a9ba8;
    --muted: #5a6a7a;
    --green: #00ff88;
    --red: #ff416c;
    --accent: #00d4ff;
    --border: rgba(0, 212, 255, 0.2);
    --glow: rgba(0, 212, 255, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 16px; }

  body {
    background: 
      radial-gradient(ellipse at 20% 80%, rgba(0, 100, 255, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(16, 24, 48, 0.8) 0%, transparent 70%),
      linear-gradient(135deg, #0a0e1a 0%, #0d1429 50%, #0a0e1a 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Segoe UI', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 212, 255, 0.03) 2px, rgba(0, 212, 255, 0.03) 4px);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: 
      radial-gradient(circle at 30% 70%, rgba(0, 212, 255, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 70% 30%, rgba(0, 100, 255, 0.05) 0%, transparent 40%);
    animation: bgRotate 120s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .header { 
    text-align: center; 
    margin-bottom: 20px; 
    position: relative;
    z-index: 1;
  }
  .header h1 { 
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    margin-bottom: 6px; 
    font-weight: 700;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #00d4ff, #00ff88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
  }
  .header .sub { 
    color: var(--dim); 
    font-size: clamp(0.75rem, 1.5vw, 0.9rem);
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    align-items: center;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 600px;
  }

  .select-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
  }

  .select-group:hover {
    border-color: var(--accent);
    box-shadow: 0 0 15px var(--glow);
  }

  .select-group label {
    font-size: 0.75rem;
    color: var(--dim);
    white-space: nowrap;
    font-weight: 500;
  }

  .select-group select {
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    padding: 2px 4px;
    min-width: 80px;
  }

  .select-group select option {
    background: var(--bg);
    color: var(--text);
    padding: 8px;
  }

  .add-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 600px;
    position: relative;
    z-index: 1;
  }
  .add-bar input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
  }
  .add-bar input:focus { 
    border-color: var(--accent); 
    box-shadow: 0 0 15px var(--glow);
  }
  .add-bar input::placeholder { color: var(--muted); }
  .add-bar button {
    background: linear-gradient(135deg, var(--accent), #0088ff);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 0 18px;
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: 600;
    white-space: nowrap;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
  }
  .add-bar button:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
  }

  /* 热搜币种区域 */
  .trending-section {
    width: 100%;
    max-width: 800px;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }
  .trending-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .trending-header .fire {
    font-size: 1.1rem;
    animation: firePulse 2s ease-in-out infinite;
  }
  @keyframes firePulse {
    0%, 100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
    50% { transform: scale(1.15) rotate(-5deg); filter: brightness(1.3); }
  }
  .trending-title {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .trending-count {
    font-size: 0.65rem;
    color: var(--muted);
    background: rgba(0, 212, 255, 0.08);
    border: 1px solid rgba(0, 212, 255, 0.15);
    border-radius: 10px;
    padding: 2px 8px;
  }
  .trending-refresh {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 0.68rem;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .trending-refresh:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0, 212, 255, 0.06);
  }

  .trending-groups {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .trending-group {
    background: linear-gradient(135deg, rgba(16, 24, 48, 0.5) 0%, rgba(10, 18, 40, 0.4) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    backdrop-filter: blur(15px);
    transition: border-color 0.3s;
  }
  .trending-group:hover {
    border-color: rgba(0, 212, 255, 0.35);
  }
  .trending-group-label {
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .trending-group-label::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 10px;
    border-radius: 2px;
  }
  .trending-group.hot .trending-group-label::before {
    background: linear-gradient(180deg, #ff416c, #ff4b2b);
  }
  .trending-group.top .trending-group-label::before {
    background: linear-gradient(180deg, #00d4ff, #0088ff);
  }
  .trending-group.gainers .trending-group-label::before {
    background: linear-gradient(180deg, #00ff88, #00cc6a);
  }

  .trending-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .trending-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(20, 30, 60, 0.5);
    border: 1px solid rgba(0, 212, 255, 0.12);
    border-radius: 10px;
    padding: 7px 12px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(10px);
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .trending-tag::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .trending-tag:hover::before { opacity: 1; }
  .trending-tag:hover {
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.03);
    transform: translateY(-2px);
  }
  .trending-tag:active {
    transform: translateY(0) scale(0.97);
  }
  .trending-tag.added {
    border-color: rgba(0, 255, 136, 0.4);
    background: rgba(0, 255, 136, 0.06);
    cursor: pointer;
  }
  .trending-tag.added:hover {
    border-color: var(--red);
    box-shadow: 0 0 16px rgba(255, 65, 108, 0.2);
  }
  .trending-tag.added:hover::before {
    background: linear-gradient(135deg, rgba(255, 65, 108, 0.06) 0%, transparent 100%);
    opacity: 1;
  }
  .trending-tag .tag-rank {
    font-size: 0.58rem;
    font-weight: 700;
    color: var(--accent);
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.15);
    border-radius: 4px;
    padding: 1px 5px;
    min-width: 20px;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .trending-tag .tag-sym {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .trending-tag .tag-name {
    font-size: 0.62rem;
    color: var(--muted);
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .trending-tag .tag-change {
    font-size: 0.7rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    padding: 1px 5px;
    border-radius: 4px;
  }
  .trending-tag .tag-change.up {
    color: var(--green);
    background: rgba(0, 255, 136, 0.1);
  }
  .trending-tag .tag-change.down {
    color: var(--red);
    background: rgba(255, 65, 108, 0.1);
  }
  .trending-tag .tag-action {
    font-size: 0.85rem;
    transition: all 0.25s;
    opacity: 0;
    flex-shrink: 0;
  }
  .trending-tag:hover .tag-action { opacity: 1; }
  .trending-tag .tag-action.add-icon { color: var(--accent); }
  .trending-tag .tag-action.remove-icon { color: var(--red); }
  .trending-tag.added .tag-action { opacity: 1; color: var(--green); }
  .trending-tag.added:hover .tag-action { color: var(--red); }

  .trending-loading {
    color: var(--dim);
    font-size: 0.8rem;
    padding: 16px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .trending-loading .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0, 212, 255, 0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .trending-err {
    color: var(--muted);
    font-size: 0.78rem;
    padding: 10px 0;
  }

  @media (max-width: 480px) {
    .trending-section { margin-bottom: 16px; }
    .trending-group { padding: 10px 12px; }
    .trending-tag { padding: 5px 9px; gap: 4px; }
    .trending-tag .tag-sym { font-size: 0.76rem; }
    .trending-tag .tag-rank { font-size: 0.52rem; }
    .trending-tag .tag-change { font-size: 0.62rem; }
    .trending-tag .tag-name { max-width: 50px; font-size: 0.56rem; }
  }

  .table-container {
    width: 100%;
    max-width: 1200px;
    overflow-x: auto;
    position: relative;
    z-index: 1;
    -webkit-overflow-scrolling: touch;
  }

  .table-container::-webkit-scrollbar {
    height: 6px;
  }
  .table-container::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 3px;
  }
  .table-container::-webkit-scrollbar-thumb {
    background: var(--accent);
    border-radius: 3px;
  }

  .table-wrap {
    min-width: 700px;
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg2);
    border: 1px solid var(--border);
    box-shadow: 
      0 0 40px rgba(0, 100, 255, 0.1),
      inset 0 1px 0 rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
  }

  .table-head, .table-row {
    display: grid;
    grid-template-columns: 1.2fr 1fr 0.9fr 0.9fr 1fr 0.8fr;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
  }
  .table-head {
    height: 44px;
    font-size: 0.72rem;
    color: var(--accent);
    background: rgba(0, 50, 100, 0.4);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .table-head span { 
    text-align: right;
    white-space: nowrap;
  }
  .table-head span:first-child { text-align: left; }
  .table-row {
    height: 60px;
    background: var(--row);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s;
    position: relative;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row.up:hover { 
    background: var(--row-hover-up);
    box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.1);
  }
  .table-row.down:hover { 
    background: var(--row-hover-down);
    box-shadow: inset 0 0 20px rgba(255, 65, 108, 0.1);
  }

  .coin-info { 
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .coin-sym { 
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .coin-name { 
    font-size: 0.7rem;
    color: var(--dim);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .api-badge {
    display: inline-block;
    font-size: 0.55rem;
    font-weight: 600;
    color: var(--accent);
    background: rgba(0, 212, 255, 0.08);
    border: 1px solid rgba(0, 212, 255, 0.15);
    border-radius: 4px;
    padding: 0px 5px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .api-badge.api-probing {
    color: var(--muted);
    background: rgba(90, 106, 122, 0.1);
    border-color: rgba(90, 106, 122, 0.2);
    animation: probeFade 1.5s ease-in-out infinite;
  }
  @keyframes probeFade {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .coin-price, .coin-high, .coin-low, .coin-vol {
    font-size: 0.85rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .coin-price { color: var(--text); }
  .coin-high { color: var(--green); }
  .coin-low { color: var(--red); }
  .coin-vol { 
    color: var(--dim);
    font-size: 0.8rem;
  }
  .coin-change {
    text-align: right;
    font-size: 0.88rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .remove-btn {
    position: absolute;
    left: 4px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.3s;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
  }
  .table-row:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { 
    color: var(--red);
    background: rgba(255, 65, 108, 0.15);
  }

  .empty { 
    color: var(--dim);
    font-size: 0.9rem;
    margin-top: 40px;
    text-align: center;
  }

  .footer { 
    margin-top: 28px;
    color: var(--muted);
    font-size: 0.72rem;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .dot { 
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot.live { 
    background: var(--green);
    animation: pulse 1.5s infinite;
    box-shadow: 0 0 12px var(--green);
  }
  .dot.error { 
    background: var(--red);
    box-shadow: 0 0 12px var(--red);
  }
  @keyframes pulse { 
    0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--green); }
    50% { opacity: 0.4; box-shadow: 0 0 4px var(--green); }
  }

  @media (min-width: 1024px) {
    body { padding: 40px 24px; }
    .controls { max-width: 800px; }
    .add-bar { max-width: 500px; }
    .table-head, .table-row {
      padding: 0 24px;
      gap: 16px;
    }
    .table-head { height: 50px; font-size: 0.78rem; }
    .table-row { height: 68px; }
    .coin-sym { font-size: 1.05rem; }
    .coin-name { font-size: 0.75rem; }
    .coin-price, .coin-high, .coin-low, .coin-vol { font-size: 0.92rem; }
    .coin-change { font-size: 0.95rem; }
  }

  @media (min-width: 768px) and (max-width: 1023px) {
    .table-head, .table-row {
      padding: 0 20px;
      gap: 12px;
    }
    .coin-sym { font-size: 1rem; }
  }

  @media (max-width: 480px) {
    body { padding: 16px 12px; }
    .header { margin-bottom: 16px; }
    .controls { gap: 8px; }
    .select-group {
      padding: 5px 10px;
      flex: 1;
      min-width: 140px;
    }
    .select-group label { font-size: 0.7rem; }
    .select-group select { font-size: 0.8rem; min-width: 60px; }
    .add-bar { margin-bottom: 16px; }
    .add-bar input { padding: 8px 12px; font-size: 0.85rem; }
    .add-bar button { padding: 0 14px; font-size: 0.85rem; }
    .table-head, .table-row { padding: 0 12px; gap: 6px; }
    .table-head { height: 38px; font-size: 0.65rem; }
    .table-row { height: 56px; }
    .coin-sym { font-size: 0.88rem; }
    .coin-name { font-size: 0.65rem; }
    .api-badge { font-size: 0.5rem; padding: 0px 4px; margin-left: 4px; }
    .coin-price, .coin-high, .coin-low, .coin-vol { font-size: 0.78rem; }
    .coin-change { font-size: 0.8rem; }
    .remove-btn { opacity: 1; left: 2px; font-size: 0.75rem; }
    .footer { margin-top: 20px; font-size: 0.68rem; }
  }

  @media (max-width: 360px) {
    .table-head, .table-row { padding: 0 8px; gap: 4px; }
    .table-head { font-size: 0.6rem; }
    .coin-sym { font-size: 0.82rem; }
    .coin-price, .coin-high, .coin-low, .coin-vol { font-size: 0.72rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>CRYPTO MONITOR</h1>
  <div class="sub" id="subText">实时行情监控系统</div>
</div>

<div class="controls">
  <div class="select-group">
    <label>优先交易所</label>
    <select id="apiSelect" onchange="pickApi(this.value)">
      <option value="-1">自动 (逐币探测)</option>
    </select>
  </div>
  <div class="select-group">
    <label>刷新间隔</label>
    <select id="refreshSelect" onchange="setInterval_(parseInt(this.value))">
      <option value="10">10秒</option>
      <option value="30">30秒</option>
      <option value="60">1分钟</option>
      <option value="300">5分钟</option>
    </select>
  </div>
</div>

<div class="add-bar">
  <input id="input" type="text" placeholder="输入币种代码添加，如 BTC、DOGE、WLFI…" autocomplete="off">
  <button onclick="addFromInput()">添加</button>
</div>

<div class="trending-section" id="trendingSection">
  <div class="trending-header">
    <span class="fire">🔥</span>
    <span class="trending-title">24h 热搜币种</span>
    <span class="trending-count" id="trendingCount">--</span>
    <button class="trending-refresh" onclick="fetchTrending()">刷新</button>
  </div>
  <div class="trending-groups" id="trendingGroups">
    <div class="trending-loading"><span class="spinner"></span>加载热搜榜…</div>
  </div>
</div>

<div class="table-container">
  <div class="table-wrap">
    <div class="table-head">
      <span>币种</span>
      <span>最新价</span>
      <span>24h最高</span>
      <span>24h最低</span>
      <span>24h成交额</span>
      <span>涨跌幅</span>
    </div>
    <div id="rows"></div>
  </div>
</div>

<div class="empty" id="empty" style="display:none">暂无自选币种</div>

<div class="footer">
  <span class="dot live" id="dot"></span>
  <span id="status">系统初始化中…</span>
</div>

<script>
const APIS = [
  { name: 'Gate.io',  price: s => `https://api.gateio.ws/api/v4/spot/tickers?currency_pair=${s}_USDT`, parse: d => { const v = Array.isArray(d)?d[0]:null; return v ? {p:parseFloat(v.last),h:parseFloat(v.high_24h)||0,l:parseFloat(v.low_24h)||0,v:parseFloat(v.quote_volume_24h)||0,c:parseFloat(v.change_percentage)||0} : null; } },
  { name: 'Binance',  price: s => `https://api.binance.com/api/v3/ticker/24hr?symbol=${s}USDT`, parse: d => d?.lastPrice ? {p:parseFloat(d.lastPrice),h:parseFloat(d.highPrice)||0,l:parseFloat(d.lowPrice)||0,v:parseFloat(d.quoteVolume)||0,c:parseFloat(d.priceChangePercent)||0} : null },
  { name: 'OKX',      price: s => `https://www.okx.com/api/v5/market/ticker?instId=${s}-USDT`, parse: d => { const v=d?.data?.[0]; if(!v)return null; const l=parseFloat(v.last),o=parseFloat(v.open24h); return {p:l,h:parseFloat(v.high24h)||0,l:parseFloat(v.low24h)||0,v:parseFloat(v.volCcy24h)||0,c:o?((l-o)/o*100):0}; } },
  { name: 'MEXC',     price: s => `https://api.mexc.com/api/v3/ticker/24hr?symbol=${s}USDT`, parse: d => d?.lastPrice ? {p:parseFloat(d.lastPrice),h:parseFloat(d.highPrice)||0,l:parseFloat(d.lowPrice)||0,v:parseFloat(d.quoteVolume)||0,c:parseFloat(d.priceChangePercent)||0} : null },
  { name: 'Bitget',   price: s => `https://api.bitget.com/api/v2/spot/market/tickers?symbol=${s}USDT`, parse: d => { const v=d?.data?.[0]; return v ? {p:parseFloat(v.lastPr),h:parseFloat(v.high24h)||0,l:parseFloat(v.low24h)||0,v:parseFloat(v.usdtVolume)||0,c:parseFloat(v.change24h)||0} : null; } },
  { name: 'HTX',      price: s => `https://api.huobi.pro/market/detail/merged?symbol=${s.toLowerCase()}usdt`, parse: d => { const v=d?.tick; if(!v)return null; return {p:v.close,h:v.high||0,l:v.low||0,v:v.vol||0,c:v.open?((v.close-v.open)/v.open*100):0}; } },
];

const DEFAULT_COINS = [
  { symbol: 'BTC', name: 'Bitcoin' },
  { symbol: 'ETH', name: 'Ethereum' },
  { symbol: 'WLFI', name: 'World Liberty Financial' },
];

let coins = loadCoins();
let activeApi = parseInt(localStorage.getItem('crypto_api') || '-1');
// Per-coin API preference: { 'BNB': 1, 'BGB': 4, ... }  (index into APIS)
let coinApiMap = loadCoinApiMap();
let refreshSec = parseInt(localStorage.getItem('crypto_refresh') || '30');
let timer = null;

function loadCoins() { try { const s=localStorage.getItem('crypto_coins_v4'); if(s)return JSON.parse(s); } catch{} return DEFAULT_COINS.map(c=>({...c})); }
function saveCoins() { localStorage.setItem('crypto_coins_v4', JSON.stringify(coins)); }
function loadCoinApiMap() { try { const s=localStorage.getItem('crypto_coin_api'); if(s)return JSON.parse(s); } catch{} return {}; }
function saveCoinApiMap() { localStorage.setItem('crypto_coin_api', JSON.stringify(coinApiMap)); }

function fmt(n) {
  if (n==null||isNaN(n)) return '—';
  return n >= 1 ? n.toLocaleString('en-US',{minimumFractionDigits:2,maximumDigits:2})
    : n < 0.01 ? n.toFixed(6) : n.toFixed(4);
}

function fmtVol(n) {
  if (n==null||isNaN(n)||n===0) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(2) + 'K';
  return n.toFixed(2);
}

function initSelects() {
  const apiSelect = document.getElementById('apiSelect');
  APIS.forEach((api, i) => {
    const option = document.createElement('option');
    option.value = i;
    option.textContent = api.name;
    apiSelect.appendChild(option);
  });
  apiSelect.value = activeApi;

  const refreshSelect = document.getElementById('refreshSelect');
  refreshSelect.value = refreshSec;
}

function pickApi(i) {
  activeApi = parseInt(i);
  localStorage.setItem('crypto_api', activeApi);
  // When user picks a specific exchange, update all coins' preference
  if (activeApi >= 0) {
    coins.forEach(c => { coinApiMap[c.symbol] = activeApi; });
    saveCoinApiMap();
  }
  fetchPrices();
}

function render() {
  const el = document.getElementById('rows');
  const emp = document.getElementById('empty');
  if (!coins.length) { el.innerHTML=''; emp.style.display=''; return; }
  emp.style.display='none';
  el.innerHTML = coins.map((c,i) => {
    const sym = c.symbol;
    const apiIdx = coinApiMap[sym];
    const apiTag = apiIdx != null && APIS[apiIdx]
      ? `<span class="api-badge" data-api="${sym}">${APIS[apiIdx].name}</span>`
      : `<span class="api-badge api-probing" data-api="${sym}">探测中…</span>`;
    return `<div class="table-row" id="row-${sym}">
      <button class="remove-btn" onclick="removeCoin(${i})" title="移除">✕</button>
      <div class="coin-info">
        <span class="coin-sym">${sym}${apiTag}</span>
        <span class="coin-name">${c.name||''}</span>
      </div>
      <div class="coin-price" id="p-${sym}">—</div>
      <div class="coin-high" id="h-${sym}">—</div>
      <div class="coin-low" id="l-${sym}">—</div>
      <div class="coin-vol" id="v-${sym}">—</div>
      <div class="coin-change" id="c-${sym}">—</div>
    </div>`;
  }).join('');
}

function addCoin(sym, name) {
  sym = sym.toUpperCase().replace(/[^A-Z0-9]/g,'');
  if (!sym || coins.find(c=>c.symbol===sym)) return;
  coins.push({symbol:sym, name:name||sym}); saveCoins();
  // If user has a specific exchange selected, pre-assign it
  if (activeApi >= 0) { coinApiMap[sym] = activeApi; saveCoinApiMap(); }
  render(); fetchPrices();
}
function removeCoin(i) { const sym=coins[i].symbol; delete coinApiMap[sym]; saveCoinApiMap(); coins.splice(i,1); saveCoins(); render(); fetchPrices(); }
function addFromInput() {
  const v = document.getElementById('input').value.trim();
  if (v) { addCoin(v); document.getElementById('input').value=''; }
}
document.getElementById('input').addEventListener('keydown', e => { if(e.key==='Enter') addFromInput(); });

function fetchTimeout(url, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(t));
}

async function tryApi(api, sym) {
  const r = await fetchTimeout(api.price(sym), 6000);
  if (!r.ok) throw new Error(r.status);
  const d = await r.json();
  const res = api.parse(d);
  if (!res) throw new Error('no data');
  return res;
}

async function fetchPrices() {
  if (!coins.length) { setStatus('live','无币种'); return; }

  let ok = 0;
  const usedApis = new Set();

  await Promise.allSettled(coins.map(async c => {
    // Build the ordered list of APIs to try for this coin
    let list;
    const prefIdx = coinApiMap[c.symbol];

    if (activeApi >= 0) {
      // User chose a specific exchange — try it first, then fallback to others
      list = [APIS[activeApi], ...APIS.filter((_,i) => i !== activeApi)];
    } else if (prefIdx != null && APIS[prefIdx]) {
      // This coin has a previously saved working exchange — try it first
      list = [APIS[prefIdx], ...APIS.filter((_,i) => i !== prefIdx)];
    } else {
      // No preference — try all APIs in order
      list = [...APIS];
    }

    for (const api of list) {
      try {
        const {p,h,l,v,c:ch} = await tryApi(api, c.symbol);
        const pEl = document.getElementById('p-'+c.symbol);
        const hEl = document.getElementById('h-'+c.symbol);
        const lEl = document.getElementById('l-'+c.symbol);
        const vEl = document.getElementById('v-'+c.symbol);
        const cEl = document.getElementById('c-'+c.symbol);
        const row = document.getElementById('row-'+c.symbol);
        if (pEl) pEl.textContent = '$'+fmt(p);
        if (hEl) hEl.textContent = h ? '$'+fmt(h) : '—';
        if (lEl) lEl.textContent = l ? '$'+fmt(l) : '—';
        if (vEl) vEl.textContent = fmtVol(v);
        if (cEl) { cEl.textContent = (ch>=0?'+':'')+ch.toFixed(2)+'%'; cEl.style.color = ch>=0 ? 'var(--green)' : 'var(--red)'; }
        if (row) { row.className = 'table-row ' + (ch>=0?'up':'down'); }

        // Remember which exchange worked for this coin
        const apiIdx = APIS.indexOf(api);
        if (coinApiMap[c.symbol] !== apiIdx) {
          coinApiMap[c.symbol] = apiIdx;
          saveCoinApiMap();
        }
        // Update the exchange badge in-place
        const badge = document.querySelector('[data-api="'+c.symbol+'"]');
        if (badge) {
          badge.textContent = api.name;
          badge.className = 'api-badge';
        }
        usedApis.add(api.name);
        ok++; return;
      } catch {}
    }
    // All exchanges failed for this coin
    const pEl=document.getElementById('p-'+c.symbol), hEl=document.getElementById('h-'+c.symbol), lEl=document.getElementById('l-'+c.symbol), vEl=document.getElementById('v-'+c.symbol), cEl=document.getElementById('c-'+c.symbol);
    if(pEl) pEl.textContent='—'; if(hEl) hEl.textContent='—'; if(lEl) lEl.textContent='—'; if(vEl) vEl.textContent='—'; if(cEl){cEl.textContent='失败'; cEl.style.color='var(--muted)';}
    const badge = document.querySelector('[data-api="'+c.symbol+'"]');
    if (badge) { badge.textContent = '无数据'; badge.className = 'api-badge api-probing'; }
  }));

  // Build status text showing which exchanges were used
  const apiNames = [...usedApis].join(' / ');
  if (ok) {
    setStatus('live', `${apiNames || 'OK'} · ${ok}/${coins.length} · ${new Date().toLocaleTimeString('zh-CN')}`);
  } else {
    setStatus('error','全部失败 — '+refreshSec+'s 后重试');
  }
}

function setStatus(t,m) { document.getElementById('dot').className='dot '+t; document.getElementById('status').textContent=m; }

function setInterval_(sec) {
  refreshSec = sec;
  localStorage.setItem('crypto_refresh', sec);
  clearInterval(timer);
  timer = setInterval(fetchPrices, sec * 1000);
  const subText = refreshSec >= 60
    ? `每 ${refreshSec/60} 分钟自动刷新`
    : `每 ${refreshSec} 秒自动刷新`;
  document.getElementById('subText').textContent = subText;
  fetchPrices();
}

initSelects();
render();
fetchPrices();
timer = setInterval(fetchPrices, refreshSec * 1000);
fetchTrending();

// ── 热搜币种 ──
let trendingCoins = []; // [{symbol, name, rank, change24h, group}]

async function fetchTrending() {
  const groupsEl = document.getElementById('trendingGroups');
  groupsEl.innerHTML = '<div class="trending-loading"><span class="spinner"></span>加载热搜榜…</div>';
  document.getElementById('trendingCount').textContent = '--';

  try {
    // 并行请求: 热搜 + 头部币 + 涨幅榜
    const [trending, topCoins, gainers] = await Promise.allSettled([
      fetchJson('https://api.coingecko.com/api/v3/search/trending', 10000),
      fetchJson('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1', 10000),
      fetchJson('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=price_change_percentage_24h_desc&per_page=10&page=1', 10000),
    ]);

    const seen = new Set();
    trendingCoins = [];

    // 1) 热搜榜
    if (trending.status === 'fulfilled' && trending.value?.coins) {
      trending.value.coins.forEach((item, i) => {
        const c = item.item;
        const sym = (c.symbol || '').toUpperCase();
        if (!sym || seen.has(sym)) return;
        seen.add(sym);
        trendingCoins.push({
          symbol: sym,
          name: c.name || '',
          rank: c.market_cap_rank || (i + 1),
          change24h: c.data?.price_change_percentage_24h?.usd ?? null,
          group: 'hot',
        });
      });
    }

    // 2) 头部币 (补充 market cap top)
    if (topCoins.status === 'fulfilled' && Array.isArray(topCoins.value)) {
      topCoins.value.forEach(c => {
        const sym = (c.symbol || '').toUpperCase();
        if (!sym || seen.has(sym)) return;
        seen.add(sym);
        trendingCoins.push({
          symbol: sym,
          name: c.name || '',
          rank: c.market_cap_rank || null,
          change24h: c.price_change_percentage_24h ?? null,
          group: 'top',
        });
      });
    }

    // 3) 涨幅榜 (24h top gainers, 不重复)
    if (gainers.status === 'fulfilled' && Array.isArray(gainers.value)) {
      gainers.value.forEach(c => {
        const sym = (c.symbol || '').toUpperCase();
        if (!sym || seen.has(sym)) return;
        seen.add(sym);
        trendingCoins.push({
          symbol: sym,
          name: c.name || '',
          rank: c.market_cap_rank || null,
          change24h: c.price_change_percentage_24h ?? null,
          group: 'gainers',
        });
      });
    }

    document.getElementById('trendingCount').textContent = trendingCoins.length + ' 个';
    renderTrending();
  } catch (e) {
    groupsEl.innerHTML = '<div class="trending-err">⚠️ 热搜加载失败，请稍后重试</div>';
  }
}

async function fetchJson(url, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  const res = await fetch(url, { signal: ctrl.signal });
  clearTimeout(t);
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

function renderTrending() {
  const groupsEl = document.getElementById('trendingGroups');
  if (!trendingCoins.length) {
    groupsEl.innerHTML = '<div class="trending-err">暂无热搜数据</div>';
    return;
  }

  const groups = {
    hot: { label: '🔥 实时热搜', items: [] },
    top: { label: '💎 市值头部', items: [] },
    gainers: { label: '📈 24h 涨幅榜', items: [] },
  };
  trendingCoins.forEach(tc => {
    if (groups[tc.group]) groups[tc.group].items.push(tc);
  });

  let html = '';
  for (const [key, g] of Object.entries(groups)) {
    if (!g.items.length) continue;
    html += `<div class="trending-group ${key}">
      <div class="trending-group-label">${g.label}</div>
      <div class="trending-tags">`;
    g.items.forEach(tc => {
      const alreadyAdded = coins.some(c => c.symbol === tc.symbol);
      const cls = alreadyAdded ? 'trending-tag added' : 'trending-tag';

      let changeHtml = '';
      if (tc.change24h != null) {
        const sign = tc.change24h >= 0 ? '+' : '';
        const dir = tc.change24h >= 0 ? 'up' : 'down';
        changeHtml = `<span class="tag-change ${dir}">${sign}${tc.change24h.toFixed(1)}%</span>`;
      }
      const rankHtml = tc.rank ? `<span class="tag-rank">#${tc.rank}</span>` : '';
      const nameShort = tc.name.length > 10 ? tc.name.slice(0, 10) + '…' : tc.name;
      const actionIcon = alreadyAdded
        ? `<span class="tag-action remove-icon" title="移除">✕</span>`
        : `<span class="tag-action add-icon" title="添加">＋</span>`;

      html += `<span class="${cls}" data-sym="${tc.symbol}" title="${tc.name}" onclick="toggleTrending('${tc.symbol}','${tc.name.replace(/'/g,"\\'")}',this)">
        ${rankHtml}
        <span class="tag-sym">${tc.symbol}</span>
        <span class="tag-name">${nameShort}</span>
        ${changeHtml}
        ${actionIcon}
      </span>`;
    });
    html += '</div></div>';
  }
  groupsEl.innerHTML = html;
}

function toggleTrending(sym, name, el) {
  const idx = coins.findIndex(c => c.symbol === sym);
  if (idx >= 0) {
    // 已在列表 → 移除
    delete coinApiMap[sym];
    saveCoinApiMap();
    coins.splice(idx, 1);
    saveCoins();
  } else {
    // 未在列表 → 添加
    if (activeApi >= 0) { coinApiMap[sym] = activeApi; saveCoinApiMap(); }
    coins.push({ symbol: sym, name: name || sym });
    saveCoins();
  }
  render();
  fetchPrices();
  renderTrending();
}
</script>
</body>
</html>
